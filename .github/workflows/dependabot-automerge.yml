name: dependabot-automerge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

# Auto-merges patch + minor dependabot PRs after CI green. Major bumps need a
# human eye on the changelog, so they're explicitly excluded.
#
# Requires repo settings:
#   Settings → General → Pull Requests → "Allow auto-merge" enabled
#   Branch protection on main → require status checks (ci / check, ci / smoke)
#
# pull_request_target gives us write access for `gh pr merge` even though the
# PR is from the dependabot-bot user. Safe here because we only act on the
# dependabot actor and inspect metadata, not run untrusted code.

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Inspect dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch + minor
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
