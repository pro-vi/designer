name: release-publish

on:
  release:
    types: [published]

# Triggered when release-please's tagged release goes from draft → published
# (i.e. the human merged the release PR and release-please created the release).
# We pull the exact tag, build, and publish to npm with provenance.

permissions:
  contents: read
  id-token: write   # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      # The package's prepack hook runs check + build during `npm publish`,
      # but we run them explicitly here so a failure surfaces in a named step
      # rather than buried in npm publish's output.
      - run: npm run check
      - run: npm run build

      - name: Verify version matches tag
        run: |
          PKG_V=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG_V" != "$TAG" ]; then
            echo "package.json version ($PKG_V) does not match release tag ($TAG)" >&2
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
