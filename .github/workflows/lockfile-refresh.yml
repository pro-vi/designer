name: lockfile-refresh

on:
  schedule:
    # Sunday 14:00 UTC — fresh lockfile waiting for Monday review.
    - cron: '0 14 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Refresh transitive deps
        # `npm update` resolves to latest within the existing semver ranges in
        # package.json, then rewrites package-lock.json. Doesn't touch
        # package.json — major bumps are dependabot's job.
        run: |
          npm update --no-audit --no-fund
          npm install --package-lock-only --no-audit --no-fund

      - name: Confirm tree still builds
        run: |
          npm ci --no-audit --no-fund
          npm run check
          npm run build

      - uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/lockfile-refresh
          title: 'chore(deps): weekly lockfile refresh'
          commit-message: 'chore(deps): weekly lockfile refresh'
          body: |
            Weekly `npm update` to pull transitive bug-fix releases within
            existing semver ranges. Auto-generated by `lockfile-refresh.yml`.

            Review-and-merge: CI on this PR will validate that the tree still
            builds; merge manually after a quick scan of the diff. (Unlike
            dependabot PRs, lockfile-refresh PRs are authored by
            `github-actions[bot]` and the auto-merge workflow does not gate
            on them.)
          labels: |
            dependencies
            lockfile
          add-paths: |
            package-lock.json
